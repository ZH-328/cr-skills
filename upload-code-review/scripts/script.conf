[DEFAULT]
# Aegis API Configuration
# API服务器地址
AEGIS_BASE_URL=https://codereview.test.linctex.com/api

# 登录凭据
AEGIS_USERNAME=superadmin
AEGIS_PASSWORD=123456

# 项目默认信息
# REPO_ID 留空时，会通过最终 gitlab_url 调用 GitLab API 自动获取
# REPO_NAME 留空时，会通过最终 gitlab_url 自动提取 group/project
REPO_ID= 
REPO_NAME= 
# GITLAB-ACCESS-TOKEN 会作为 GitLab GITLAB-ACCESS-TOKEN 请求头，用于自动获取 REPO_ID
GITLAB-ACCESS-TOKEN=
